name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast feedback: pure-Python logic tests (no ROS2). The ros2-marked tests skip here.
  python-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install test deps
        run: pip install pytest numpy
      - name: Run logic tests
        run: pytest -q

  # Full graph: build the colcon workspace and run every test (including the ros2-marked ones).
  ros2-build-test:
    runs-on: ubuntu-latest
    container:
      image: ros:humble-ros-base
    steps:
      - uses: actions/checkout@v4

      - name: Install build & test tooling
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-colcon-common-extensions \
            python3-pytest \
            python3-numpy \
            python3-rosdep
          rm -rf /var/lib/apt/lists/*

      - name: Resolve ROS dependencies
        shell: bash
        run: |
          rosdep update --rosdistro humble
          rosdep install --from-paths ros2_ws/src --ignore-src -r -y

      - name: colcon build
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          cd ros2_ws
          colcon build --symlink-install

      - name: Run full test suite
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          source ros2_ws/install/setup.bash
          pytest -q
